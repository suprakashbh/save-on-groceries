version: 1
applications:
  - appRoot: grocery-deals-app
    frontend:
      phases:
        preBuild:
          commands:
            - cd grocery-deals-app
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: grocery-deals-app/dist
        files:
          - '**/*'
      cache:
        paths:
          - grocery-deals-app/node_modules/**/*
